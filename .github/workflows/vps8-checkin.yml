name: VPS8 Checkin

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '开启更详细日志（仅手动触发时使用）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve checkin date
        id: checkin-date
        run: |
          echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore daily success marker
        id: daily-success
        uses: actions/cache/restore@v4
        with:
          path: .checkin-cache/success
          key: vps8-checkin-success-${{ steps.checkin-date.outputs.date }}

      - name: Skip if already succeeded today
        if: steps.daily-success.outputs.cache-hit == 'true'
        run: |
          echo "北京时间 ${{ steps.checkin-date.outputs.date }} 已有成功签到记录，跳过本次登录和签到。"

      - name: Setup Python
        if: steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fontconfig fonts-noto-cjk fonts-noto-color-emoji
          sudo fc-cache -f -v

      - name: Install Python dependencies
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r vps8-checkin/requirements.txt

      - name: Verify Chrome and font installation
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          which google-chrome || which google-chrome-stable || true
          google-chrome --version || google-chrome-stable --version || true
          fc-match sans:lang=zh-cn

      - name: Run checkin
        if: steps.daily-success.outputs.cache-hit != 'true'
        env:
          VPS8_EMAIL: ${{ vars.VPS8_EMAIL }}
          VPS8_PASSWORD: ${{ vars.VPS8_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONUNBUFFERED: '1'
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" python -m vps8-checkin.src.checkin

      - name: Write daily success marker
        if: success() && steps.daily-success.outputs.cache-hit != 'true'
        run: |
          mkdir -p .checkin-cache
          printf 'success_at=%s\nrun=%s\n' "$(date -u +%FT%TZ)" "${{ github.run_id }}" > .checkin-cache/success

      - name: Save daily success marker
        if: success() && steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .checkin-cache/success
          key: vps8-checkin-success-${{ steps.checkin-date.outputs.date }}

      - name: Upload screenshots on failure
        if: failure() && steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      # 👇 每天自动把 +cron 分钟
      - name: Auto increment cron
        if: success()
        run: |
          # 读取当前 cron
          yaml_file=".github/workflows/vps8-checkin.yml"
          cron_line=$(grep -E "^[ ]*- cron: '.*'" "$yaml_file" | head -1)
          cron_val=$(echo "$cron_line" | sed -E "s/.*cron: '([0-9 ]+)'.*/\1/")
          minute=$(echo "$cron_val" | awk '{print $1}')
          hour=$(echo "$cron_val" | awk '{print $2}')
          echo "当前时间：$hour 时 $minute 分"

          # 每次+分钟
          new_minute=$((minute + 11))
          new_hour=$hour
          # 分钟满 60 进 1 小时
          [ $new_minute -ge 60 ] && { new_minute=$((new_minute-60)); new_hour=$((hour+1)); }
          # 小时满 1 归0 
          [ $new_hour -ge 1 ] && new_hour=0

          new_cron="$new_minute $new_hour * * *"
          echo "新时间：$new_hour 时 $new_minute 分"
          
          # 替换并提交
          sed -i -E "s/- cron: '.*'/- cron: '$new_cron'/" "$yaml_file"
          git config user.name "Actions"
          git config user.email "actions@github.com"
          git add "$yaml_file"
          git commit -m "Auto update cron to $new_cron"
          git push
