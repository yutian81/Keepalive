name: VPS8 Checkin

on:
  schedule:
    - cron: '14 0 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '开启更详细日志（仅手动触发时使用）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
          
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Resolve checkin date
        id: checkin-date
        run: |
          echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore daily success marker
        id: daily-success
        uses: actions/cache/restore@v4
        with:
          path: .checkin-cache/success
          key: vps8-checkin-success-${{ steps.checkin-date.outputs.date }}

      - name: Skip if already succeeded today
        if: steps.daily-success.outputs.cache-hit == 'true'
        run: |
          echo "北京时间 ${{ steps.checkin-date.outputs.date }} 已有成功签到记录，跳过本次登录和签到。"

      - name: Setup Python
        if: steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install system dependencies
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fontconfig fonts-noto-cjk fonts-noto-color-emoji
          sudo fc-cache -f -v

      - name: Install Python dependencies
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r vps8-checkin/requirements.txt

      - name: Verify Chrome and font installation
        if: steps.daily-success.outputs.cache-hit != 'true'
        run: |
          which google-chrome || which google-chrome-stable || true
          google-chrome --version || google-chrome-stable --version || true
          fc-match sans:lang=zh-cn

      - name: Run checkin
        if: steps.daily-success.outputs.cache-hit != 'true'
        env:
          VPS8_EMAIL: ${{ vars.VPS8_EMAIL }}
          VPS8_PASSWORD: ${{ vars.VPS8_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONUNBUFFERED: '1'
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" python -m vps8-checkin.src.checkin

      - name: Write daily success marker
        if: success() && steps.daily-success.outputs.cache-hit != 'true'
        run: |
          mkdir -p .checkin-cache
          printf 'success_at=%s\nrun=%s\n' "$(date -u +%FT%TZ)" "${{ github.run_id }}" > .checkin-cache/success

      - name: Save daily success marker
        if: success() && steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .checkin-cache/success
          key: vps8-checkin-success-${{ steps.checkin-date.outputs.date }}

      - name: Upload screenshots on failure
        if: failure() && steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Auto increment cron
        if: success()
        run: |
          yaml_file=".github/workflows/vps8-checkin.yml"
          
          current_hour=$(date -u +"%H")
          current_minute=$(date -u +"%M")
          current_hour=$((10#$current_hour))
          current_minute=$((10#$current_minute))

          # 1. 计算当前时间距离 0 点的总分钟数，并加上随机增量 (5~15分钟)
          random_increment=$(( RANDOM % 11 + 5 ))
          current_total_minutes=$(( current_hour * 60 + current_minute ))
          new_total_minutes=$(( current_total_minutes + random_increment ))

          # 如果总分钟数超过了 119 分钟 (即达到了 UTC 02:00 边界)
          # 无论有没有满 60 分钟进位，都强行回滚到 0 点的随机前 15 分钟
          if [ $new_total_minutes -ge 120 ]; then
            new_hour=0
            new_minute=$(( RANDOM % 16 ))
            echo "总时间已达或超过 UTC 02:00 边界，明天的 Cron 将回滚重置归零"
          else
            new_hour=$(( new_total_minutes / 60 ))
            new_minute=$(( new_total_minutes % 60 ))
          fi

          new_cron="$new_minute $new_hour * * *"
          echo "当前运行时间 (UTC): $current_hour:$current_minute"
          echo "顺延时间递增增量: +$random_increment 分钟"
          echo "最终写入明天的 Cron 时间为：$new_cron"
          
          # 替换并推送
          sed -i -E "s/- cron: '10 0 * * *'/" "$yaml_file"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$yaml_file"
          git commit -m "chore: auto update cron to $new_cron [skip ci]"
          git pull --rebase
          git push
